name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish built artifacts to PyPI (off by default)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: make sync

      - name: Check
        run: make check

      - name: Build
        run: make build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hudctl-dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Manual, explicit opt-in only. Tag pushes never publish automatically.
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: hudctl-dist
          path: dist

      - name: Publish to PyPI
        run: uv publish
